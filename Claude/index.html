<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="健康计划">
<meta name="theme-color" content="#3E7C59">
<title>我的12周健康计划</title>
<style>
  :root{
    --bg:#F3F6EE; --bg-alt:#E7EFDF; --card:#FFFFFF; --ink:#1E2A22; --ink-soft:#5B6B5F;
    --accent:#3E7C59; --accent-soft:#DCEBE1; --warm:#D6A429; --warm-soft:#FBF0D9;
    --red:#C1694F; --border:#DCE5D2;
    --shadow:0 1px 2px rgba(30,42,34,.06),0 6px 20px rgba(30,42,34,.06); --radius:16px;
  }
  [data-theme="dark"]{
    --bg:#121C16; --bg-alt:#182319; --card:#1B271F; --ink:#E9F0E6; --ink-soft:#9AAB9F;
    --accent:#6FBF93; --accent-soft:#213329; --warm:#E8BA5C; --warm-soft:#2B2417;
    --red:#E08B72; --border:#28352C;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;min-height:100vh;padding-bottom:92px;transition:background .3s}
  header{position:sticky;top:0;z-index:10;background:var(--bg);padding:18px 18px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
  header h1{font-size:20px;margin:0;font-weight:700}
  header .sub{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .theme-toggle{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--border);font-size:16px;cursor:pointer;box-shadow:var(--shadow);flex:none}
  main{padding:14px 16px 8px;max-width:600px;margin:0 auto}
  h2{font-size:17px;margin:4px 0 10px}
  h3{font-size:14.5px;margin:16px 0 8px}
  .hint{font-size:12.5px;color:var(--ink-soft);line-height:1.7;background:var(--bg-alt);border-radius:12px;padding:10px 12px;margin:0 0 12px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow);font-size:13.5px;line-height:1.75}
  .card b{color:var(--ink)}
  .note{background:var(--warm-soft);border:1px solid var(--warm);border-radius:12px;padding:11px 13px;font-size:12.5px;line-height:1.7;margin-bottom:12px}
  .muted{font-size:12px;color:var(--ink-soft)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--border);vertical-align:top}
  th{color:var(--ink-soft);font-weight:600;font-size:12px}
  tr:last-child td,tr:last-child th{border-bottom:none}
  .kcal{color:var(--accent);font-size:11px;font-weight:600}
  ul.clean{margin:0;padding-left:2px;list-style:none}
  ul.clean li{padding:4px 0;font-size:13px;line-height:1.65}
  ol.pflow{margin:6px 0 0;padding-left:20px}
  ol.pflow li{padding:3px 0;font-size:13px;line-height:1.65}

  /* week chips */
  .weeksel{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;-webkit-overflow-scrolling:touch}
  .weeksel.hide{display:none}
  .wk{flex:none;font-size:12.5px;font-weight:600;border:1px solid var(--border);background:var(--card);color:var(--ink-soft);padding:7px 13px;border-radius:100px;cursor:pointer;text-decoration:none}
  .wk.on{background:var(--accent);border-color:var(--accent);color:#fff}

  /* menu day */
  .day{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow)}
  .dh{font-weight:800;font-size:14.5px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .meal{display:flex;gap:9px;align-items:flex-start;padding:5px 0;font-size:13px;line-height:1.55}
  .ml{flex:none;width:22px;height:22px;border-radius:7px;background:var(--bg-alt);color:var(--ink-soft);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .din{display:flex;gap:9px;align-items:flex-start;width:100%;text-align:left;background:var(--accent-soft);border:none;border-radius:10px;padding:8px 9px;margin:4px 0;cursor:pointer;font-family:inherit;font-size:13px;line-height:1.5;color:var(--ink)}
  .ml-l{background:var(--warm-soft);color:var(--warm)}
  .ml-d{background:var(--accent);color:#fff}
  .dintxt{flex:1}
  .see{flex:none;font-size:11px;color:var(--accent);font-weight:700;margin-top:2px}

  /* cook cards */
  .sech{font-size:13px;font-weight:800;color:var(--ink-soft);margin:14px 0 8px}
  .cookgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .cookcard{position:relative;text-align:left;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 12px;cursor:pointer;font-family:inherit;box-shadow:var(--shadow)}
  .cookcard.lc{background:var(--warm-soft)}
  .cn{display:block;font-size:13.5px;font-weight:800;color:var(--ink)}
  .ct{display:block;font-size:11px;color:var(--ink-soft);margin-top:3px}
  .fav{position:absolute;top:8px;right:10px;font-size:12px;color:var(--border)}
  .fav.on{color:var(--red)}

  /* prep chips */
  .pchips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
  .pchip{font-size:12.5px;font-weight:600;background:var(--accent-soft);color:var(--accent);border:none;border-radius:100px;padding:7px 12px;cursor:pointer;font-family:inherit}
  .pchip.fresh{background:var(--warm-soft);color:var(--warm)}
  .pnote{font-size:12px;color:var(--ink-soft);line-height:1.6;width:100%}

  /* shop */
  .shopbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;font-size:12px;color:var(--ink-soft)}
  .pbar{flex:1;min-width:90px;height:8px;background:var(--bg-alt);border-radius:100px;overflow:hidden}
  .pbar i{display:block;height:100%;width:0;background:var(--accent);border-radius:100px;transition:width .3s}
  .tog{display:flex;align-items:center;gap:5px;cursor:pointer}
  .tog input{accent-color:var(--accent)}
  .resetbtn{font-size:12px;color:var(--ink-soft);background:none;border:1px dashed var(--border);border-radius:100px;padding:5px 11px;cursor:pointer}
  .stchips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px}
  .stchip{font-size:12px;font-weight:700;border:1px solid var(--border);background:var(--card);color:var(--ink-soft);border-radius:100px;padding:6px 12px;cursor:pointer;font-family:inherit}
  .stchip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .stlegend{font-size:11.5px;color:var(--ink-soft);line-height:1.7;margin-bottom:12px}
  .shopgroup{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow)}
  .shopgroup h5{margin:0 0 6px;font-size:13.5px}
  .shoplist{list-style:none;margin:0;padding:0}
  .buy{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer}
  .buy:last-child{border-bottom:none}
  .buy .box{flex:none;width:18px;height:18px;border:2px solid var(--border);border-radius:6px}
  .buy.done .box{background:var(--accent);border-color:var(--accent)}
  .buy.done .txt{text-decoration:line-through;color:var(--ink-soft)}
  .buy .txt{flex:1}
  .stbadge{flex:none;font-size:10.5px;font-weight:800;padding:3px 7px;border-radius:100px}
  .st-NF{background:var(--warm-soft);color:var(--warm)}
  .st-FB{background:var(--accent-soft);color:var(--accent)}
  .st-TT{background:#F3E3EE;color:#A2527F}
  [data-theme="dark"] .st-TT{background:#33202C;color:#D98BB8}
  .buy.hidden{display:none}

  /* overlay recipe */
  #overlay{position:fixed;inset:0;background:var(--bg);z-index:50;display:none;overflow-y:auto}
  #overlay.open{display:block}
  .ovbar{position:sticky;top:0;background:var(--bg);display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--border);z-index:2}
  .ovback{border:none;background:none;color:var(--accent);font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;padding:0}
  .ovtitle{flex:1;font-size:16px;font-weight:800;text-align:center}
  .ovwake{border:1px solid var(--border);background:var(--card);color:var(--ink-soft);font-size:11.5px;border-radius:100px;padding:6px 10px;cursor:pointer;font-family:inherit}
  .ovwake.on{background:var(--warm-soft);color:var(--warm);border-color:var(--warm)}
  .ovbody{padding:16px;max-width:600px;margin:0 auto}
  .rtag2{display:inline-block;font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:100px;padding:5px 12px;margin-bottom:8px}
  .lonote{background:var(--warm-soft);border-radius:12px;padding:10px 12px;font-size:13px;line-height:1.65;margin-bottom:8px}
  .ingr-list{list-style:none;margin:0;padding:0}
  .ingr-list li{display:flex;gap:9px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;cursor:pointer}
  .ingr-list li:last-child{border-bottom:none}
  .ingr-list .cb{flex:none;width:18px;height:18px;border:2px solid var(--border);border-radius:6px}
  .ingr-list li.got .cb{background:var(--accent);border-color:var(--accent)}
  .ingr-list li.got span:last-child{text-decoration:line-through;color:var(--ink-soft)}
  .steps{list-style:none;margin:0;padding:0}
  .steps li{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--border);font-size:15px;line-height:1.7;cursor:pointer}
  .steps li:last-child{border-bottom:none}
  .steps .sn{flex:none;width:26px;height:26px;border-radius:50%;background:var(--accent-soft);color:var(--accent);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;margin-top:2px}
  .steps li.done{opacity:.4}
  .steps li.done span:last-child{text-decoration:line-through}
  .favbtn{margin-top:14px;width:100%;border:1px solid var(--border);background:var(--card);color:var(--ink-soft);border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .favbtn.on{color:var(--red);border-color:var(--red)}

  /* breakfast pool */
  .pool{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .poolcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;font-size:12.5px;line-height:1.6;box-shadow:var(--shadow)}

  /* plan ring */
  .ring-wrap{display:flex;align-items:center;gap:18px}
  .ring{position:relative;width:100px;height:100px;flex:none}
  .ring svg{width:100%;height:100%;transform:rotate(-90deg)}
  .ring circle{fill:none;stroke-width:9}
  .ring .track{stroke:var(--bg-alt)}
  .ring .prog{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .4s}
  .ring .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .num b{font-size:25px;line-height:1}
  .ring .num span{font-size:10.5px;color:var(--ink-soft);margin-top:2px}
  .week-controls{display:flex;align-items:center;gap:10px;margin-top:10px}
  .week-controls button{width:33px;height:33px;border-radius:50%;border:1px solid var(--border);background:var(--bg-alt);color:var(--ink);font-size:16px;cursor:pointer}
  .phase-tag{display:inline-block;font-size:11.5px;font-weight:800;color:var(--accent);background:var(--accent-soft);padding:4px 11px;border-radius:100px}
  .pill-list{display:flex;flex-wrap:wrap;gap:8px}
  .pill{font-size:12px;background:var(--warm-soft);color:var(--warm);padding:5px 11px;border-radius:100px;font-weight:800}

  /* weight */
  .input-row{display:flex;gap:8px;margin:8px 0}
  .input-row input{border:1px solid var(--border);background:var(--bg-alt);color:var(--ink);border-radius:10px;padding:8px 10px;font-size:13px;font-family:inherit;min-width:0}
  .input-row input[type=date]{flex:1.3}
  .input-row input[type=number]{flex:1}
  .input-row button{border:none;background:var(--accent);color:#fff;font-weight:800;border-radius:10px;padding:8px 15px;font-size:13px;cursor:pointer;flex:none;font-family:inherit}
  .weight-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
  .weight-row:last-child{border-bottom:none}
  .weight-row .d{color:var(--ink-soft);font-size:12px}
  .weight-row .v{font-weight:800}
  .delta{font-size:11.5px;margin-left:6px}
  .delta.down{color:var(--accent)}
  .delta.up{color:var(--red)}

  /* move grid */
  .day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:6px 0 2px}
  .day-cell{aspect-ratio:1;border-radius:12px;border:1px solid var(--border);background:var(--bg-alt);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;font-size:11px;color:var(--ink-soft);gap:4px}
  .day-cell .dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
  .day-cell.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .day-cell.on .dot{background:#fff}

  .disclaimer{background:var(--warm-soft);border:1px solid var(--warm);border-radius:14px;padding:12px 14px;font-size:12.5px;line-height:1.7}
  .foot2{font-size:12px;color:var(--ink-soft);line-height:1.7;padding:4px 2px 10px}

  nav.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:20;background:var(--card);border-top:1px solid var(--border);display:flex;padding:7px 4px calc(7px + env(safe-area-inset-bottom))}
  nav.tabbar button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 1px;cursor:pointer;color:var(--ink-soft);font-family:inherit}
  nav.tabbar button .ic{font-size:18px}
  nav.tabbar button .lb{font-size:10px;font-weight:700}
  nav.tabbar button.on{color:var(--accent)}
</style>
</head>
<body>
<header>
  <div>
    <h1>我的12周健康计划 🌿</h1>
    <div class="sub">31岁 · 160cm · 多伦多 · 减脂 &amp; 改善血脂 · 1400–1600大卡</div>
  </div>
  <button class="theme-toggle" onclick="tg()">🌗</button>
</header>
<main>
  <div id="weeksel" class="weeksel"></div>
  <div id="panel"></div>
</main>
<div id="overlay"></div>
<nav class="tabbar">
  <button data-m="plan" onclick="setMode('plan')"><span class="ic">📅</span><span class="lb">计划</span></button>
  <button data-m="menu" onclick="setMode('menu')"><span class="ic">🍽️</span><span class="lb">菜单</span></button>
  <button data-m="prep" onclick="setMode('prep')"><span class="ic">🥘</span><span class="lb">备餐</span></button>
  <button data-m="shop" onclick="setMode('shop')"><span class="ic">🛒</span><span class="lb">买菜</span></button>
  <button data-m="move" onclick="setMode('move')"><span class="ic">🏋️</span><span class="lb">运动</span></button>
  <button data-m="info" onclick="setMode('info')"><span class="ic">📖</span><span class="lb">说明</span></button>
</nav>
<script>
var DATA={weeks:[
{n:1,theme:"家常经典",sub:"零失败的家常味，先把节奏跑顺。每天约1450–1550大卡·蛋白95–110g。",fresh:[3,6],
days:[
{d:"一",bf:"① 燕麦豆浆蛋 · 燕麦+无糖豆浆+水煮蛋+蓝莓",lt:"cook",lc:"l",li:0,lunchText:"照烧鸡胸便当",dinner:"🍅 番茄龙利鱼 + 蒜蓉油麦菜 + 糙米",di:0,snack:"希腊酸奶"},
{d:"二",bf:"③ 番茄炒蛋吐司 · 少油番茄炒蛋+全麦吐司+无糖豆浆",lt:"lo",lc:"d",li:0,lunchText:"备餐·番茄龙利鱼（热一下）",dinner:"🍗 照烧去皮鸡腿 + 白灼菜心 + 红薯",di:1,snack:"毛豆一把"},
{d:"三",bf:"② 酸奶燕麦碗 · 希腊酸奶+燕麦+核桃+香蕉",lt:"cook",lc:"l",li:1,lunchText:"香干芹菜鸡丝",dinner:"🌶 鸡末麻婆豆腐 + 蒜香菠菜 + 糙米",di:2,snack:"黄瓜条"},
{d:"四",bf:"① 燕麦豆浆蛋 · 燕麦+无糖豆浆+水煮蛋+蓝莓",lt:"lo",lc:"d",li:2,lunchText:"备餐·麻婆豆腐（热一下）",dinner:"🦐 姜醋白灼虾 + 香菇青菜 + 玉米",di:3,snack:"苹果+核桃"},
{d:"五",bf:"④ 蔬菜蛋饼 · 胡萝卜菠菜鸡蛋饼(少油)+无糖豆浆",lt:"cook",lc:"l",li:2,lunchText:"金枪鱼糙米沙拉",dinner:"🫑 黑椒鸡胸彩椒 + 糙米",di:4,snack:"无糖豆浆"},
{d:"六",bf:"⑤ 鸡丝燕麦粥 · 鸡丝香菇燕麦粥+凉拌黄瓜",lt:"lo",lc:"d",li:4,lunchText:"备餐·黑椒鸡胸（热一下）",dinner:"🍄 香菇蒸滑鸡 + 蚝油生菜 + 糙米",di:5,snack:"希腊酸奶"},
{d:"日",bf:"⑥ 花生酱吐司 · 天然花生酱薄涂全麦吐司+酸奶+苹果",lt:"lo",lc:"d",li:5,lunchText:"备餐·香菇蒸滑鸡（热一下）",dinner:"🐟 香煎三文鱼 + 蒜蓉西兰花 + 红薯",di:6,snack:"小番茄"}],
dinners:[
{name:"番茄龙利鱼",tag:"低脂·高蛋白·酸甜开胃",ingrList:["龙利鱼(巴沙鱼)生重200g","番茄2个","蒜末·姜末·葱","生抽1勺","番茄酱1勺","盐·淀粉少许","油1茶匙"],steps:["鱼解冻切块，加盐、料酒、淀粉抓匀腌10分钟","番茄切块，热锅1茶匙油炒到出沙出汁","加半碗水+生抽+番茄酱煮开","下鱼块轻推，中小火煮3–4分钟至熟，撒葱花配糙米"]},
{name:"照烧去皮鸡腿",tag:"嫩滑下饭·去皮少饱和脂肪",ingrList:["去骨去皮鸡腿肉生重180g","生抽1.5勺","味淋/料酒1勺","蜂蜜或糖½勺","蒜","油1茶匙"],steps:["鸡腿用叉子扎孔，少许盐抓匀","不粘锅1茶匙油，中火煎到两面金黄","倒入生抽+味淋+½勺糖+2勺水，收汁裹匀","切块，配白灼菜心和红薯"]},

function $(s){return document.querySelector(s)}
var ST={planWeek:1,menuWeek:1,theme:'light',shop:{},favs:{},days:{},weights:[],hideBought:false,store:'all'};
function save(){var s=JSON.stringify(ST);try{localStorage.setItem('hp12',s)}catch(e){}try{if(window.storage)window.storage.set('hp12',s)}catch(e){}}
async function load(){var s=null;try{s=localStorage.getItem('hp12')}catch(e){}
  if(!s){try{if(window.storage){var r=await window.storage.get('hp12');if(r)s=r.value}}catch(e){}}
  if(s){try{var o=JSON.parse(s);for(var k in o)ST[k]=o[k]}catch(e){}}}
var curMode='plan';
function week(){for(var i=0;i<DATA.weeks.length;i++){if(DATA.weeks[i].n===ST.menuWeek)return DATA.weeks[i]}return DATA.weeks[0]}

function tg(){ST.theme=(document.documentElement.getAttribute('data-theme')==='dark')?'light':'dark';
  document.documentElement.setAttribute('data-theme',ST.theme);save();}

function renderWeekSel(){
  var box=$('#weeksel');box.innerHTML='';
  var show=(curMode==='menu'||curMode==='prep'||curMode==='shop');
  box.className='weeksel'+(show?'':' hide');if(!show)return;
  DATA.weeks.forEach(function(w){var b=document.createElement('button');
    b.className='wk'+(w.n===ST.menuWeek?' on':'');b.textContent='第'+w.n+'周·'+w.theme;
    b.onclick=function(){ST.menuWeek=w.n;save();render()};box.appendChild(b);});
}

  h+='<div class="card">🧊 <b>保存 & 加热：</b>熟食冷藏<b>3–4天</b>、冷冻2–3周。米饭和肉类微波<b>热透</b>再吃。三文鱼建议当天煎当天吃，隔顿会腥。</div>';
  return h;
}

var STLAB={NF:'No Frills',FB:'Food Basics',TT:'大统华'};
function chip(code,label){return '<button class="stchip'+(ST.store===code?' on':'')+'" data-c="'+code+'" onclick="filterStore(\''+code+'\')">'+label+'</button>'}
function shopHTML(){
  var w=week(),h='<h2>第'+w.n+'周 · 买菜</h2>';
  h+='<div class="shopbar"><div class="pbar"><i id="pfill"></i></div><span id="pcount"></span>'
   +'<label class="tog"><input type="checkbox" id="hb"'+(ST.hideBought?' checked':'')+' onchange="toggleHide()"> 只看没买的</label>'
   +'<button class="resetbtn" onclick="resetShop()">清空本周</button></div>';
  h+='<div class="stchips">'+chip('all','全部')+chip('NF','No Frills')+chip('FB','Food Basics')+chip('TT','大统华 T&T')+'</div>';
  h+='<div class="stlegend">🏪 <b>No Frills</b>=肉·蛋·常见蔬果最便宜(用PC Optimum攒积分) · <b>Food Basics</b>=看传单比价,鸡胸/三文鱼常有特价 · <b>大统华T&T</b>=中式蔬菜·豆腐·冷冻海鲜·酱料。💰 本周预估 $70–85(一人),月合计约$300上下,在你预算内。</div>';
  var idx=0;
  for(var grp in w.shop){
    h+='<div class="shopgroup"><h5>'+grp+'</h5><ul class="shoplist">';
    w.shop[grp].forEach(function(pair){
      var key='w'+w.n+'_'+idx;idx++;var done=ST.shop[key]?' done':'';
      h+='<li class="buy'+done+'" data-key="'+key+'" data-s="'+pair[1]+'" onclick="toggleBuy(this)"><span class="box"></span><span class="txt">'+pair[0]+'</span><span class="stbadge st-'+pair[1]+'">'+STLAB[pair[1]]+'</span></li>';
    });
    h+='</ul></div>';
  }
  return h;
}
function toggleBuy(li){li.classList.toggle('done');ST.shop[li.dataset.key]=li.classList.contains('done');save();applyFilters();updateProg();}
function toggleHide(){ST.hideBought=$('#hb').checked;save();applyFilters();}
function filterStore(c){ST.store=c;save();document.querySelectorAll('.stchip').forEach(function(b){b.classList.toggle('on',b.dataset.c===c)});applyFilters();updateProg();}
function applyFilters(){document.querySelectorAll('#panel .buy').forEach(function(li){
  var hide=(ST.store!=='all'&&li.dataset.s!==ST.store)||(ST.hideBought&&li.classList.contains('done'));
  li.classList.toggle('hidden',hide);})}
function updateProg(){var a=[].slice.call(document.querySelectorAll('#panel .buy')).filter(function(li){return ST.store==='all'||li.dataset.s===ST.store});
  var t=a.length,n=a.filter(function(li){return li.classList.contains('done')}).length;
  var f=$('#pfill');if(f)f.style.width=(t?Math.round(n/t*100):0)+'%';
  var c=$('#pcount');if(c)c.textContent='已买 '+n+'/'+t;}
function resetShop(){var w=week();for(var k in ST.shop){if(k.indexOf('w'+w.n+'_')===0)delete ST.shop[k]}save();render();}

function openCook(coll,idx,lo){
  var w=week(),r=coll==='l'?w.lunches[idx]:w.dinners[idx];
  var h='<div class="ovbar"><button class="ovback" onclick="closeCook()">‹ 返回</button><span class="ovtitle">'+r.name+'</span>'
   +'<button class="ovwake" id="wakebtn" onclick="toggleWake()">🔆 常亮</button></div><div class="ovbody">';
  h+='<div class="rtag2">'+r.tag+'</div>';
  if(lo)h+='<div class="lonote">💡 这是<b>备餐日</b>做好的《'+r.name+'》——从冰箱拿一盒<b>热透</b>就行 👍 想现做的话，食谱在下面。</div>';
  h+='<h3>🧺 材料（生重·1人份）</h3><ul class="ingr-list">';
  r.ingrList.forEach(function(it){h+='<li onclick="this.classList.toggle(\'got\')"><span class="cb"></span><span>'+it+'</span></li>'});
  h+='</ul><h3>👩‍🍳 做法（点一步划掉一步）</h3><ol class="steps">';
  r.steps.forEach(function(s,i){h+='<li onclick="this.classList.toggle(\'done\')"><span class="sn">'+(i+1)+'</span><span>'+s+'</span></li>'});
  h+='</ol>';
  var fav=ST.favs[r.name];
  h+='<button class="favbtn'+(fav?' on':'')+'" data-n="'+r.name+'" onclick="toggleFav(this)">'+(fav?'♥ 已收藏':'♡ 收藏这道菜')+'</button></div>';
  var ov=$('#overlay');ov.innerHTML=h;ov.classList.add('open');document.body.style.overflow='hidden';
}
function closeCook(){$('#overlay').classList.remove('open');document.body.style.overflow='';releaseWake();}
function toggleFav(btn){var n=btn.dataset.n,on=!ST.favs[n];ST.favs[n]=on;save();
  btn.classList.toggle('on',on);btn.textContent=on?'♥ 已收藏':'♡ 收藏这道菜';}
var wl=null;
function toggleWake(){var btn=$('#wakebtn');if(wl){releaseWake();return}
  if(!('wakeLock' in navigator)){btn.textContent='本机不支持';return}
  navigator.wakeLock.request('screen').then(function(s){wl=s;btn.classList.add('on');btn.textContent='🔆 常亮·开';
    wl.addEventListener('release',function(){btn.classList.remove('on');btn.textContent='🔆 常亮';wl=null});}).catch(function(){btn.textContent='开启失败'});}
function releaseWake(){if(wl){try{wl.release()}catch(e){}wl=null}var b=$('#wakebtn');if(b){b.classList.remove('on');b.textContent='🔆 常亮'}}
document.addEventListener('visibilitychange',function(){if(wl&&document.visibilityState==='visible'){navigator.wakeLock.request('screen').then(function(s){wl=s}).catch(function(){})}});

// ---------- 计划页 ----------
function phaseFor(w){if(w<=4)return'阶段一 · 建立习惯';if(w<=8)return'阶段二 · 稳定执行';return'阶段三 · 评估决策';}
var R=48,CIRC=2*Math.PI*R;
function planHTML(){
  var w=ST.planWeek,pct=w/12;
  var h='<div class="card"><div class="ring-wrap"><div class="ring"><svg viewBox="0 0 110 110">'
   +'<circle class="track" cx="55" cy="55" r="'+R+'"></circle>'
   +'<circle class="prog" cx="55" cy="55" r="'+R+'" style="stroke-dasharray:'+CIRC+';stroke-dashoffset:'+(CIRC*(1-pct))+'"></circle>'
   +'</svg><div class="num"><b>'+w+'</b><span>/ 12 周</span></div></div>'
   +'<div><div class="phase-tag">'+phaseFor(w)+'</div><div class="week-controls">'
   +'<button onclick="stepWeek(-1)">−</button><span class="muted">调整当前周数</span><button onclick="stepWeek(1)">+</button>'
   +'</div></div></div></div>';
  h+='<div class="card"><h3 style="margin-top:0">🗺️ 三阶段总览</h3><table>'
   +'<tr><th>第1–4周</th><td>建立习惯:适应热量目标,记录饮食,养成走路+力量训练的节奏。菜单用「豆香高纤」前两套轮换。</td></tr>'
   +'<tr><th>第5–8周</th><td>稳定执行:巩固习惯,「清爽粤式」「下饭微辣」接着轮换避免厌倦,看体重趋势而非单日波动。</td></tr>'
   +'<tr><th>第9–12周</th><td>评估决策:复查体重/血脂趋势,决定继续生活方式为主,还是和医生讨论药物辅助。</td></tr>'
   +'</table></div>';
  h+='<div class="card"><h3 style="margin-top:0">🎯 核心目标</h3><div class="pill-list">'
   +'<span class="pill">1400–1600 kcal/天</span><span class="pill">蛋白质 95–110g</span>'
   +'<span class="pill">每周减 0.5–0.7kg</span><span class="pill">预算 $200–400/月</span></div></div>';
  h+='<div class="card"><h3 style="margin-top:0">⚖️ 体重记录</h3><p class="muted" style="margin-top:-4px">建议每周固定一天记一次,方便我们跟进调整</p>'
   +'<div class="input-row"><input type="date" id="wDate"><input type="number" id="wVal" placeholder="kg" step="0.1"><button onclick="addWeight()">记录</button></div>'
   +'<div id="wList"></div><p class="muted" id="wEmpty">还没有记录,记第一条开始跟踪趋势</p></div>';
  return h;
}
function stepWeek(d){ST.planWeek=Math.max(1,Math.min(12,ST.planWeek+d));save();render();}
function todayStr(){var d=new Date(),p=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}
function renderWeightWidget(){
  var wDate=$('#wDate'),wList=$('#wList'),wEmpty=$('#wEmpty');
  if(!wDate)return;
  wDate.value=wDate.value||todayStr();
  var sorted=ST.weights.slice().sort((a,b)=>a.date.localeCompare(b.date));
  wEmpty.style.display=sorted.length?'none':'block';
  wList.innerHTML=sorted.slice().reverse().map(function(entry){
    var i=sorted.findIndex(e=>e.date===entry.date&&e.weight===entry.weight),prev=sorted[i-1],dh='';
    if(prev){var diff=entry.weight-prev.weight,cls=diff<=0?'down':'up',sign=diff>0?'+':'';
      dh='<span class="delta '+cls+'">'+sign+diff.toFixed(1)+'kg</span>';}
    return '<div class="weight-row"><span class="d">'+entry.date+'</span><span><span class="v">'+entry.weight+'kg</span>'+dh+'</span></div>';
  }).join('');
}
function addWeight(){
  var d=$('#wDate').value||todayStr(),v=parseFloat($('#wVal').value);
  if(!v||v<=0)return;
  ST.weights=ST.weights.filter(e=>e.date!==d);ST.weights.push({date:d,weight:v});save();
  $('#wVal').value='';renderWeightWidget();
}

// ---------- 总渲染 ----------
function render(){
  renderWeekSel();var p=$('#panel');
  if(curMode==='plan')p.innerHTML=planHTML();
  else if(curMode==='menu')p.innerHTML=menuHTML();
  else if(curMode==='prep')p.innerHTML=prepHTML();
  else if(curMode==='shop'){p.innerHTML=shopHTML();applyFilters();updateProg();}
  else if(curMode==='move')p.innerHTML=moveHTML();
  else p.innerHTML=infoHTML();
  document.querySelectorAll('nav.tabbar button').forEach(function(b){b.classList.toggle('on',b.dataset.m===curMode)});
  if(curMode==='plan')renderWeightWidget();
  if(curMode==='move')renderDayGrid();
  window.scrollTo(0,0);
}
function setMode(m){curMode=m;render();}

(async function init(){
  await load();
  if(ST.theme==='dark')document.documentElement.setAttribute('data-theme','dark');
  render();
})();
</script>
